<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kyobo Hide List Options</title>
    <link rel="stylesheet" href="/src/shared/saas-theme.css" />
    <style>
      .page-shell {
        max-width: 1080px;
        margin: 0 auto;
        padding: 32px var(--space-6) 40px;
      }

      .page-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: var(--space-5);
        margin-bottom: var(--space-5);
      }

      h1 {
        margin: 0;
        font-size: 24px;
        line-height: 1.25;
      }

      .desc {
        max-width: 620px;
        margin: 6px 0 0;
        color: var(--app-muted);
        font-size: 14px;
        line-height: 1.5;
      }

      .toolbar {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: var(--space-2);
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: var(--space-3);
        margin-bottom: var(--space-5);
      }

      .summary-card {
        border: 1px solid var(--app-border);
        border-radius: var(--app-radius);
        background: var(--app-surface);
        box-shadow: var(--app-shadow);
        padding: var(--space-4);
      }

      .summary-card span {
        display: block;
        margin-bottom: var(--space-2);
      }

      .summary-card strong {
        font-size: 22px;
        line-height: 1;
      }

      .table-panel {
        overflow: hidden;
        border: 1px solid var(--app-border);
        border-radius: var(--app-radius);
        background: var(--app-surface);
        box-shadow: var(--app-shadow);
      }

      .table-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: var(--space-3);
        border-bottom: 1px solid var(--app-border);
        padding: var(--space-4);
      }

      .table-header h2 {
        margin: 0;
        font-size: 15px;
      }

      table {
        width: 100%;
        border-collapse: collapse;
      }

      th,
      td {
        text-align: left;
        border-bottom: 1px solid var(--app-border);
        padding: 11px var(--space-4);
        font-size: 13px;
        vertical-align: top;
      }

      th {
        background: var(--app-surface-subtle);
        color: var(--app-muted);
        font-size: 12px;
        font-weight: 700;
      }

      td:first-child {
        max-width: 260px;
        color: var(--app-muted-strong);
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        overflow-wrap: anywhere;
      }

      td:nth-child(3) {
        max-width: 420px;
        overflow-wrap: anywhere;
      }

      a {
        color: var(--app-primary);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .empty {
        margin: 0;
        padding: var(--space-6);
        color: var(--app-muted);
        font-size: 14px;
        text-align: center;
      }

      @media (max-width: 760px) {
        .page-shell {
          padding: var(--space-5) var(--space-4) 32px;
        }

        .page-header {
          display: grid;
        }

        .toolbar {
          justify-content: flex-start;
        }

        .summary-grid {
          grid-template-columns: 1fr;
        }

        .table-panel {
          overflow-x: auto;
        }

        table {
          min-width: 760px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page-shell">
      <header class="page-header">
        <div>
          <h1>Hidden List Management</h1>
          <p class="desc">Review saved Kyobo product keys, open their source links, and remove entries that should appear again.</p>
        </div>
        <div class="toolbar">
          <button id="refresh-options-button" type="button">Refresh</button>
          <button id="clear-all-button" class="danger" type="button">Clear all</button>
        </div>
      </header>

      <section class="summary-grid" aria-label="Hidden list summary">
        <div class="summary-card">
          <span class="metric-label">Saved hidden items</span>
          <strong id="hidden-items-summary-count">-</strong>
        </div>
        <div class="summary-card">
          <span class="metric-label">Storage scope</span>
          <strong>Local</strong>
        </div>
        <div class="summary-card">
          <span class="metric-label">Supported site</span>
          <strong>Kyobo</strong>
        </div>
      </section>

      <section class="table-panel" aria-live="polite">
        <div class="table-header">
          <h2>Hidden products</h2>
          <span class="status-badge is-on">Synced</span>
        </div>

        <table>
          <thead>
            <tr>
              <th scope="col">Key</th>
              <th scope="col">Created at</th>
              <th scope="col">Original link</th>
              <th scope="col">Action</th>
            </tr>
          </thead>
          <tbody id="hidden-items-body"></tbody>
        </table>

        <p id="hidden-items-empty" class="empty" hidden>No hidden items saved.</p>
      </section>
    </main>
    <script type="module" src="/src/options/index.ts"></script>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kyobo Hide List Popup</title>
    <style>
      :root {
        --popup-bg: #f7f8fa;
        --popup-surface: #ffffff;
        --popup-border: #d7deea;
        --popup-text: #1d2533;
        --popup-muted: #5a6578;
        --popup-accent: #1f6feb;
        --popup-accent-hover: #1658bc;
        --popup-radius: 10px;
        --space-1: 4px;
        --space-2: 8px;
        --space-3: 12px;
        --space-4: 16px;
        --space-button-y: var(--space-2);
      }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--popup-bg);
        color: var(--popup-text);
        font-family: 'Noto Serif KR', Georgia, serif;
      }

      .popup {
        padding: var(--space-4);
      }

      .panel {
        background: var(--popup-surface);
        border: 1px solid var(--popup-border);
        border-radius: var(--popup-radius);
        padding: var(--space-4);
        display: grid;
        gap: var(--space-3);
      }

      h1 {
        margin: 0;
        font-size: 16px;
        line-height: 1.3;
      }

      .row {
        display: flex;
        align-items: baseline;
        justify-content: space-between;
        gap: var(--space-2);
      }

      .label {
        color: var(--popup-muted);
        font-size: 12px;
      }

      .value {
        font-size: 14px;
        font-weight: 600;
      }

      .list {
        margin: 0;
        padding-left: 20px;
        display: grid;
        gap: var(--space-1);
        font-size: 12px;
      }

      .empty {
        margin: 0;
        font-size: 12px;
        color: var(--popup-muted);
      }

      .actions {
        display: flex;
        gap: var(--space-2);
      }

      button {
        border: 1px solid var(--popup-border);
        border-radius: 8px;
        background: #fff;
        color: var(--popup-text);
        font-size: 12px;
        padding: var(--space-button-y) var(--space-3);
        cursor: pointer;
      }

      button.primary {
        border-color: var(--popup-accent);
        background: var(--popup-accent);
        color: #fff;
      }

      button.primary:hover {
        background: var(--popup-accent-hover);
      }
    </style>
  </head>
  <body>
    <main class="popup">
      <section class="panel" aria-live="polite">
        <h1>Kyobo Hide List</h1>

        <div class="row">
          <span class="label">Hidden items</span>
          <strong id="hidden-count" class="value">0</strong>
        </div>

        <div>
          <p class="label">Recent hidden keys</p>
          <ul id="recent-hidden-list" class="list"></ul>
          <p id="recent-empty-message" class="empty">No hidden items yet.</p>
        </div>

        <div class="row">
          <span class="label">Current tab</span>
          <strong id="tab-status" class="value">Checking…</strong>
        </div>

        <div class="row">
          <span class="label">Hide engine</span>
          <strong id="hide-enabled-status" class="value">On</strong>
        </div>

        <div class="actions">
          <button id="refresh-button" type="button">Refresh status</button>
          <button id="toggle-hide-enabled-button" type="button">Turn off hide</button>
        </div>

        <div class="actions">
          <button id="open-hidden-list-button" type="button">Open hidden list</button>
          <button id="open-options-button" class="primary" type="button">Open options</button>
        </div>
      </section>
    </main>
    <script type="module" src="/src/popup/index.ts"></script>
  </body>
</html>
